[descarga]
url_default = https://scw.pjn.gov.ar/scw/expediente.seam?cid=682804
carpeta_base = expedientes
carpeta_salida = expediente_pdfs
max_concurrentes = 8
pausa_pagina = 1
timeout_tabla = 120
timeout_ajax = 30
reintentos = 3
# Tope de seguridad si la paginación del sitio falla (evita bucles infinitos).
max_paginas_scraping = 500

[union]
carpeta_entrada = expediente_pdfs
archivo_salida = expediente_unificado.pdf
calidad = ebook
workers = 4
sin_comprimir = false

[division]
archivo_entrada = expediente_unificado.pdf
carpeta_salida = expediente_por_año
max_mb = 40
solo_año = 

