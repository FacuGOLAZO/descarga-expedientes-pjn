[descarga]
url_default = https://scw.pjn.gov.ar/scw/expediente.seam?cid=682804
carpeta_base = expedientes
# PDFs y _registro.json: también se escanea esta carpeta en "Mis expedientes"
# (nombre exacto: si usás expedientes_pdfs, cambiá acá y en [union] carpeta_entrada).
carpeta_salida = expediente_pdfs
max_concurrentes = 8
pausa_pagina = 3
timeout_tabla = 120
timeout_ajax = 30
reintentos = 3
max_paginas_scraping = 500

[union]
# Debe coincidir con [descarga] carpeta_salida si unís los mismos PDFs.
carpeta_entrada = expediente_pdfs
archivo_salida = expediente_unificado.pdf
calidad = ebook
workers = 4
sin_comprimir = false

[division]
archivo_entrada = expediente_unificado.pdf
carpeta_salida = expediente_por_año
max_mb = 40
solo_año = 

